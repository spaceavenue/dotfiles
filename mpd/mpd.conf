music_directory "$XDG_MUSIC_DIR"
playlist_directory "$XDG_MUSIC_DIR/mpd_playlists"
db_file "$HOME/.local/share/mpd/mpd.db"
log_file "syslog"
auto_update "yes"
bind_to_address "127.0.0.1"
port "6600"
restore_paused "yes"
max_output_buffer_size "16384"

audio_output {
	type "pipewire"
	name "pipewire"
}

audio_output {
       type	"fifo"
       name	"Visualizer feed"
       path	"/tmp/mpd.fifo"
       format	"44100:16:2"
}
