[main]
layer=overlay

min-width=300
max-width=300
max-height=300

# From outer-margin top/bottom
edge-margin-vertical=10
# From outer-margin left/right
edge-margin-horizontal=10
# Gap between stacked notifications
notification-margin=10
# Padding inside the notification
padding-vertical=10
padding-horizontal=10

border-size=2
border-color=ffd1dbff
border-radius=20

max-icon-size=64

default-timeout=5

background=00000088

title-font=Iosevka Etoile:size=14
title-color=ffd1dbff
title-format=<b><i>%a%A</i></b>

summary-font=Iosevka Etoile:size=16
summary-color=f38ba8ff
summary-format=<b>%s</b>

body-font=Iosevka Etoile:size=14
body-color=f38ba8ff
body-format=%b

icon-theme="Pixora Dark"

# Other default options for reference

# Global Layout & Compositor options
# output=                 # The output/monitor to display notifications on. If blank, the compositor chooses.
# stacking-order=bottom-up # How to stack multiple notifications: 'bottom-up' or 'top-down'.
# anchor=top-right        # Position on screen: top-left, top-center, top-right, bottom-left, bottom-center, bottom-right, or center.

# Icon themes and rendering
# scaling-filter=lanczos3 # Filter used when scaling non-SVG images: none, nearest, bilinear, cubic, lanczos3.

# Actions & External Utilities
# selection-helper=dmenu  # Command to execute to let users select a notification action via stdin/stdout.
# selection-helper-uses-null-separator=no # Enable if your selection helper supports NULL-separated strings instead of newlines (e.g., fuzzel --dmenu0).
# play-sound=aplay ${filename} # Command executed to play notification sounds. ${filename} expands to the audio path.

# Edge-case Per-Urgency Defaults
# dpi-aware=no            # 'yes' scales fonts using monitor DPI (physical size stays same); 'no' scales via monitor scaling factor.
# max-timeout=0           # Absolute cap on a notification's lifetime in seconds, regardless of what the app requests (0 to disable).
# idle-timeout=0          # Time in seconds you must be idle to prevent notifications from being dismissed (0 to disable).
# sound-file=             # Absolute path to a default audio file to play whenever any notification is received.
# icon=                   # Fallback icon (path or name) to use when the notification doesn't provide one.

# Progress Bar Options (Rendered when a notification has an int:value hint)
# progress-bar-height=20  # Height of the progress bar in pixels.
# progress-color=ffffffff # Color of the progress indicator bar (RGBA).
# progress-style=bar      # Style of progress: 'bar' (separate indicator) or 'background' (fills notification background).

